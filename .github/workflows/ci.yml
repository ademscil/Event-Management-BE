name: CI — Backend

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main

concurrency:
  group: be-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      PORT: 3000
      BASE_URL: http://localhost:3000
      DB_SERVER: localhost
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: CSI_TEST
      DB_PORT: 1433
      DB_ENCRYPT: false
      DB_TRUST_SERVER_CERTIFICATE: true
      JWT_SECRET: test-secret-key-minimum-32-characters-long
      JWT_EXPIRATION: 8h
      JWT_REFRESH_EXPIRATION: 7d
      SESSION_TIMEOUT_MINUTES: 30
      SESSION_MAX_DURATION_HOURS: 8
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: "*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit tests (CI profile)
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true
